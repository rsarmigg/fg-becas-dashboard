<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Fundación Gigante · Elegibilidad de becas</title>
<style>
  :root{--pine:#0E5A48;--ground:#F5F4EF;--ink:#1D2621;--line:#E2DFD6;--muted:#66706A}
  *{box-sizing:border-box} body{margin:0;background:var(--ground);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px 30px;
    max-width:380px;width:100%;box-shadow:0 10px 40px rgba(14,90,72,.08)}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--pine);
    font-weight:700;margin:0 0 10px}
  h1{font-family:Georgia,serif;font-size:24px;margin:0 0 6px;letter-spacing:-.01em}
  p.s{color:var(--muted);font-size:14px;margin:0 0 22px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px;
    text-transform:uppercase;letter-spacing:.06em}
  input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--line);
    border-radius:9px;background:var(--ground)}
  input:focus{outline:2px solid var(--pine);outline-offset:1px}
  button{margin-top:14px;width:100%;padding:12px;font-size:15px;font-weight:600;color:#fff;
    background:var(--pine);border:0;border-radius:9px;cursor:pointer}
  button:hover{background:#0b4a3b}
  .err{color:#b1442a;font-size:13.5px;margin:12px 0 0;min-height:18px}
  .note{color:var(--muted);font-size:11.5px;margin-top:16px;line-height:1.5}
</style></head>
<body>
<div id="gate" class="gate"><form class="box" id="f">
  <p class="eyebrow">Fundación Gigante</p>
  <h1>Dashboard de elegibilidad</h1>
  <p class="s">Contenido protegido. Ingresa la contraseña para verlo.</p>
  <label for="pw">Contraseña</label>
  <input id="pw" type="password" autocomplete="off" autofocus>
  <button type="submit">Entrar</button>
  <p class="err" id="err"></p>
  <p class="note">Los datos mostrados son agregados (sin nombres ni CURP). El descifrado ocurre en tu navegador.</p>
</form></div>

  const dec = new TextDecoder();
  const fromB64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

  async function abrir(password){
    const salt = fromB64(DATA.salt), iv = fromB64(DATA.iv), ct = fromB64(DATA.ct);
    const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(password),
      "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt, iterations:DATA.iter, hash:"SHA-256"}, base,
      {name:"AES-GCM", length:256}, false, ["decrypt"]);
    const plano = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
    return dec.decode(plano);
  }

  document.getElementById("f").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = document.getElementById("err");
    err.textContent = "";
    try {
      const html = await abrir(document.getElementById("pw").value);
      document.open(); document.write(html); document.close();
    } catch (_) {
      err.textContent = "Contraseña incorrecta.";
    }
  });
